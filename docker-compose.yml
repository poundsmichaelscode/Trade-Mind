version: "3.9"
services:
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    env_file:
      - ./apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/trademind
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  worker:
    build: ./apps/api
    command: celery -A app.worker.celery_app worker --loglevel=info
    working_dir: /app
    env_file:
      - ./apps/api/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/trademind
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - api
      - redis

  flower:
    build: ./apps/api
    command: celery -A app.worker.celery_app flower --port=5555
    working_dir: /app
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trademind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trademind"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
