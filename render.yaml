services:
  - type: web
    name: trade-mind-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    healthCheckPath: /status
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 0.6.4
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 50
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: CORS_ORIGINS
        value: https://trade-mind-web-bc1e.vercel.app
      - key: PAYSTACK_CALLBACK_URL
        value: https://trade-mind-web-bc1e.vercel.app/pricing?upgraded=1
      - key: CLOUDINARY_FOLDER
        value: trademind
      - key: MAIL_FROM
        value: TradeMind <noreply@trademind.app>
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: trade-mind-db
          property: connectionString

databases:
  - name: trade-mind-db
    plan: free
    databaseName: trademind
    user: trademind
