services:
  - type: web
    name: trademind-api
    env: docker
    plan: starter
    rootDir: apps/api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trademind-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false

  - type: web
    name: trademind-web
    env: docker
    plan: starter
    rootDir: apps/web
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://trademind-api.onrender.com

databases:
  - name: trademind-db
    plan: starter
